<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Presentación - Elkin Calvo</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    overflow:hidden;
}

/* Fondo galaxia animado */

body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle at 20% 30%, #4b0082, transparent),
                radial-gradient(circle at 80% 60%, #1e90ff, transparent),
                radial-gradient(circle at 50% 80%, #ff00ff, transparent),
                black;
    animation: galaxia 30s linear infinite;
    z-index:-1;
}

@keyframes galaxia{
    from{
        transform: translate(-25%, -25%) rotate(0deg);
    }
    to{
        transform: translate(-25%, -25%) rotate(360deg);
    }
}

/* Botón principal */

#btnSobreMi{
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#00bfff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

#btnSobreMi:hover{
    transform:scale(1.1);
}

/* Tarjeta */

.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    text-align:center;
    transition:0.5s;
}

.card.active{
    transform:translate(-50%,-50%) scale(1);
}

/* Botón cerrar */

.cerrar{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:20px;
    background:#ff4c4c;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.cerrar:hover{
    background:#ff1a1a;
}

ul{
    text-align:left;
}

</style>
</head>

<body>

<button id="btnSobreMi" onclick="abrir()">Sobre mí</button>

<div class="card" id="card">

<h1>Elkin Calvo</h1>

<p>👨‍💻 Trabajo en una empresa en el área de tecnología.</p>

<p>Me gusta:</p>

<ul>
<li>✈️ Viajar</li>
<li>🎮 Videojuegos</li>
<li>💻 Tecnología</li>
</ul>

<p>Bienvenido a mi presentación personal.</p>

<button class="cerrar" onclick="cerrar()">Cerrar</button>

</div>

<script>

function abrir(){
    document.getElementById("card").classList.add("active");
    document.getElementById("btnSobreMi").style.display="none";
}

function cerrar(){
    document.getElementById("card").classList.remove("active");
    document.getElementById("btnSobreMi").style.display="block";
}

</script>

</body>
</html>
